<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kytarový Hmatník</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">

  <!-- ─── Záhlaví ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <h1>Kytarový Hmatník</h1>
    <button id="theme-toggle" title="Přepnout světlé / tmavé téma">☾</button>
  </header>

  <!-- ─── Postranní panel ─────────────────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Sekce 1: Volba akordu / stupnice -->
    <section class="card">
      <h2>Akord / Stupnice</h2>

      <div class="tab-toggle">
        <button id="tab-chord">Akordy</button>
        <button id="tab-scale">Stupnice</button>
      </div>

      <label>Základní tón</label>
      <div id="root-picker"></div>

      <!-- Panel akordů -->
      <div id="chord-panel">
        <label>Typ akordu</label>
        <div class="btn-group-wrap" id="chord-type-group"></div>
      </div>

      <!-- Panel stupnic -->
      <div id="scale-panel" hidden>
        <label>Typ stupnice</label>
        <div class="btn-group-wrap" id="scale-type-group"></div>
      </div>
    </section>

    <!-- Sekce 2: Přehrávání -->
    <section class="card">
      <h2>Přehrávání</h2>
      <button id="play-btn">▶ Přehrát akord</button>
      <button id="stop-btn" style="margin-top: 4px;">⏹ Zastavit</button>

      <label>Zvuk</label>
      <div class="btn-group" id="timbre-group">
        <button data-value="sine">Kytara</button>
        <button data-value="organ">Varhany</button>
      </div>

      <label>Oktáva: <span id="play-octave-display">3</span></label>
      <input type="range" id="play-octave" min="0" max="7" value="3" step="1">

      <label>Hlasitost: <span id="volume-display">70</span>%</label>
      <input type="range" id="volume-slider" min="0" max="100" value="70" step="5">

      <label>Délka tónu</label>
      <div class="btn-group" id="play-duration-group">
        <button data-value="short">Krátce</button>
        <button data-value="normal">Normálně</button>
        <button data-value="long">Trvale</button>
      </div>

      <div class="check-row" style="margin-top: 10px;">
        <input type="checkbox" id="live-play-check">
        <label for="live-play-check" style="text-transform: none; letter-spacing: 0; font-size: 0.82rem; margin: 0; color: var(--text-primary);">
          Živý náhled (hraje průběžně)
        </label>
      </div>
    </section>

    <!-- Sekce 3: Základní nastavení -->
    <section class="card">
      <h2>Nastavení nástroje</h2>

      <label>Nástroj</label>
      <div class="btn-group" id="instrument-group"></div>

      <label>Ladění</label>
      <select id="tuning-select">
        <option value="Standardní">Standardní</option>
      </select>

      <div id="custom-tuning-pickers" hidden></div>

      <label>Notace</label>
      <div class="btn-group" id="notation-group">
        <button data-value="czech">Česká (H, Cis)</button>
        <button data-value="international">Mezinár. (B, C#)</button>
      </div>

      <label>Posuvky</label>
      <div class="btn-group" id="accidentals-group">
        <button data-value="sharp"># Křížky</button>
        <button data-value="flat">♭ Béčka</button>
        <button data-value="auto">Auto</button>
      </div>

      <label>Počet pražců: <span id="fret-count-display">22</span></label>
      <input type="range" id="fret-count" min="12" max="24" value="22" step="1">

      <div class="check-row" style="margin-top: 8px;">
        <input type="checkbox" id="nonlinear-check">
        <label for="nonlinear-check" style="text-transform: none; letter-spacing: 0; font-size: 0.85rem; margin: 0; color: var(--text-primary);">
          Reálné vzdálenosti pražců
        </label>
      </div>

      <label>Barvy not</label>
      <div class="btn-group" id="color-mode-group">
        <button data-value="interval">Interval</button>
        <button data-value="tone">Tón</button>
      </div>
    </section>

  </aside>

  <!-- ─── Hlavní sloupec (hmatník + info) ─────────────────────────────────── -->
  <div class="main-column">

  <!-- ─── Hmatník ─────────────────────────────────────────────────────────── -->
  <main class="fretboard-container">
    <svg id="fretboard-svg" xmlns="http://www.w3.org/2000/svg" aria-label="Kytarový hmatník"></svg>
  </main>

  <!-- ─── Info panel ──────────────────────────────────────────────────────── -->
  <div class="info-panel">

    <!-- Levý sloupec: Popis akordu / stupnice -->
    <div class="info-col">
      <div id="info-description">
        <h3>Vyberte akord nebo stupnici</h3>
      </div>
      <h4 style="margin-top: 16px;">Legenda intervalů</h4>
      <div id="interval-legend"></div>
    </div>

    <!-- Střed: Kruh kvint -->
    <div class="info-col cof-container">
      <h3>Kruh kvint</h3>
      <svg id="cof-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"
           aria-label="Kruh kvint — kliknutím změníte základní tón"></svg>
      <p style="font-size: 0.75rem; margin-top: 8px; text-align: center;">
        Klikněte na tóninu pro výběr
      </p>
    </div>

    <!-- Pravý sloupec: Nashville + dominanty -->
    <div class="info-col">
      <div id="info-nashville">
        <h3>Nashvillská notace</h3>
        <p>Vyberte stupnici pro zobrazení.</p>
      </div>
    </div>

  </div>

  </div><!-- /.main-column -->

</div><!-- /.app-layout -->

<!-- Tooltip overlay -->
<div id="tooltip" hidden></div>

<script src="js/theory.js" defer></script>
<script src="js/render.js" defer></script>
<script src="js/audio.js" defer></script>
<script src="js/app.js" defer></script>

</body>
</html>
